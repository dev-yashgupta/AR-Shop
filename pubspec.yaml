name: ar_shop
description: A complete AR Shopping App built with Flutter.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  ar_flutter_plugin_2: ^0.0.3
  model_viewer_plus: ^1.7.0
  google_mlkit_face_detection: ^0.9.0
  camera: ^0.10.5+9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  screenshot: ^3.0.0
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^7.2.1
  permission_handler: ^11.4.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  path_provider: ^2.1.2
  intl: ^0.19.0

  vector_math: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/tryons/
    - assets/images/products/
    - assets/images/banners/
    - assets/animations/
